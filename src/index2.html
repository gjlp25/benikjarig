<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        :root {
            --cherry-blossom: #e8aeb7;
            --uranian-blue: #b8e1ff;
            --ice-blue: #a9fff7;
            --light-green: #94fbab;
            --cambridge-blue: #82aba1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--uranian-blue) 0%, var(--ice-blue) 50%, var(--light-green) 100%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1rem;
        }

        main {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            margin-left: 0.25rem;
        }

        input[type="date"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #1e293b;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: var(--cherry-blossom);
            box-shadow: 0 0 0 3px rgba(232, 174, 183, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(90deg, #fce7f3 0%, #bbf7d0 100%);
            color: #334155;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(0.99);
        }

        /* Celebrity section styling from SCREEN_3 */
        .celebrity-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2.5rem 1.5rem;
            margin-top: 1.5rem;
            width: 100%;
            text-align: center;
        }

        .celebrity-title {
            font-size: 1.75rem;

            color: #334155;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .celebrity-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .celebrity-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .celebrity-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 0.75rem;
        }

        .celebrity-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
            text-align: center;
        }

        .celebrity-age {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .site-footer {
            margin-top: 3rem;
            padding-bottom: 2rem;
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .site-footer a {
            text-decoration: underline;
            color: #1e293b;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>

<body>
<main>
<!-- Main Form Container -->
<section class="container" data-purpose="main-form-card">
<div class="text-5xl mb-4">🎂</div>
<h1 class="text-3xl font-bold text-slate-800 mb-2 leading-tight">Ben ik vandaag jarig?</h1>
<p class="subtitle">Voer je geboortedatum in en ontdek het!</p>
<form class="w-full" id="birthday-form">
<div class="form-group">
<label for="birthday">Jouw geboortedatum</label>
<input id="birthday" name="birthday" required="" type="date"/>
</div>
<button class="btn" type="submit">
                    🎉 Check of ik jarig ben!
                </button>
</form>
</section>
<!-- Dynamic Results Placeholder -->
<div id="result-root"></div>
<!-- Celebrities Section -->
<section class="celebrity-card" data-purpose="celebrity-birthdays">
<h2 class="celebrity-title">Beroemdheden die vandaag jarig zijn</h2>
<div class="celebrity-grid" id="celebrity-container">
<p class="text-slate-500 text-sm">Laden...</p>
</div>
</section>
</main>
<footer class="site-footer">
<p>
            © 2025 benikvandaagjarig.nl<br/>
            Gemaakt door Robert Postma<br/>
            Contact: info@benikvandaagjarig.nl<br/>
            Laatste update: maart 2026<br/>
<a href="#">Privacyverklaring</a><br/>
<a href="#">Verwijder toestemming</a>
</p>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const celebrityContainer = document.getElementById('celebrity-container');
            const birthdayForm = document.getElementById('birthday-form');
            const resultRoot = document.getElementById('result-root');

            // 1. Fetch and render celebrities
            async function fetchCelebrities() {
                try {
                    const response = await fetch('today.json');
                    if (!response.ok) throw new Error('Failed to fetch');
                    const data = await response.json();
                    renderCelebrities(data);
                } catch (error) {
                    console.error('Celebrity fetch error:', error);
                    celebrityContainer.innerHTML = '<p class="text-slate-400 text-sm">Geen gegevens beschikbaar voor vandaag.</p>';
                }
            }

            function renderCelebrities(celebrities) {
                if (!celebrities || !celebrities.length) {
                    celebrityContainer.innerHTML = '<p class="text-slate-400 text-sm">Geen beroemdheden gevonden.</p>';
                    return;
                }

                celebrityContainer.innerHTML = '';
                celebrities.forEach(person => {
                    const item = document.createElement('div');
                    item.className = 'celebrity-item animate-fade-in';
                    item.innerHTML = `
                        <img alt="${person.name}" class="celebrity-img" src="${person.image_url || 'https://via.placeholder.com/80'}"/>
                        <span class="celebrity-name">${person.name}</span>
                        <span class="celebrity-age">${person.age} jaar</span>
                    `;
                    celebrityContainer.appendChild(item);
                });
            }

            // 2. Birthday check logic
            birthdayForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const birthdayInput = document.getElementById('birthday').value;
                if (!birthdayInput) return;

                const birthDate = new Date(birthdayInput);
                const today = new Date();
                
                const isBirthday = birthDate.getDate() === today.getDate() && 
                                  birthDate.getMonth() === today.getMonth();

                renderResult(isBirthday, birthDate);
            });

            function renderResult(isBirthday, birthDate) {
                const age = new Date().getFullYear() - birthDate.getFullYear();
                
                resultRoot.innerHTML = `
                    <div class="container animate-fade-in" style="margin-top: 1rem; background: ${isBirthday ? 'linear-gradient(135deg, #fff 0%, #fff1f2 100%)' : 'linear-gradient(135deg, #fff 0%, #f0f9ff 100%)'}">
                        <div class="text-4xl mb-3">${isBirthday ? '🥳' : '😢'}</div>
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">${isBirthday ? 'JA! Gefeliciteerd!' : 'Nee, helaas...'}</h2>
                        <p class="text-slate-600">${isBirthday ? `Je bent vandaag ${age} jaar geworden! Maak er een fantastische dag van.` : 'Vandaag is niet jouw verjaardag. Maar kop op, elke dag is een feestje!'}</p>
                    </div>
                `;
                
                resultRoot.scrollIntoView({ behavior: 'smooth' });
            }

            fetchCelebrities();
        });
    </script>
</body></html>

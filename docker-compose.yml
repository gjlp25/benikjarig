version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: benikvandaagjarig:local
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app:ro
    command: npm run test
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
